const PQS = [
  {id:"p1",dim:"d1",text:"I can explain what generative AI is and how it differs from other types of software to a colleague who has never used it.",opts:["Not yet — I'm still learning what AI is","Somewhat — I have a general idea but couldn't explain it clearly","Yes — I could explain it confidently with examples","Strongly — I regularly explain AI concepts to others and stay current"]},
  {id:"p1b",dim:"d1",text:"I understand the difference between a large language model (LLM), a chatbot interface, and an AI agent — and can explain why the distinction matters for educational use.",opts:["These terms are unfamiliar to me","I've heard them but couldn't explain the differences","I can explain the basic differences and why they matter","I can explain these concepts and discuss how each applies to different instructional contexts"]},
  {id:"p2",dim:"d2",text:"I have used AI tools (ChatGPT, Gemini, Copilot, NotebookLM, PlayLab, etc.) for professional tasks — not just casual experimentation.",opts:["I haven't tried any AI tools yet","I've experimented casually but not for professional work","I use AI tools regularly for course prep, grading support, or content creation","I've configured or customized AI tools for specific instructional purposes"]},
  {id:"p2b",dim:"d2",text:"I understand what prompt engineering is and can write effective prompts that include context, constraints, role assignment, and output formatting.",opts:["I don't know what prompt engineering means","I've heard the term but mostly use simple, unstructured prompts","I write structured prompts with context and constraints and iterate based on results","I teach prompt engineering techniques to students or colleagues"]},

  {id:"p4",dim:"d4",text:"I can articulate specific ethical concerns about using AI in higher education — including data privacy, algorithmic bias, and academic integrity.",opts:["I'm aware there are ethical issues but can't articulate specific ones","I can name a few concerns but haven't developed a clear position","I have a clear position on AI ethics and communicate it to students","I've contributed to institutional AI policy or ethics guidelines"]},

  {id:"p5",dim:"d5",text:"I have shared AI strategies, tools, or insights with colleagues — through conversations, presentations, or mentoring.",opts:["I haven't shared anything yet — I'm still figuring it out myself","I've had informal conversations about AI with a few colleagues","I've presented on AI at department meetings, flex days, or PD events","I've led or organized AI professional development for others"]},

function s2l(s){return s<=0.8?0:s<=1.6?1:s<=2.4?2:3;}
const LL=["Novice","Developing","Proficient","Advanced"];
const LC=["#A32D2D","#854F0B","#185FA5","#0F6E56"];

function compute(ans){
  const ds={},dc={};
  PQS.forEach(q=>{ds[q.dim]=(ds[q.dim]||0)+(ans[q.id]||0);dc[q.dim]=(dc[q.dim]||0)+1;});
  Object.keys(ds).forEach(d=>{ds[d]/=dc[d];});
  const avg=Object.values(ds).reduce((a,b)=>a+b,0)/5;
  const c=CQS.map(q=>ans[q.id]||0), g=GQS.map(q=>ans[q.id]||0);
  const[t,cu,pd,te]=c,[pg,tl,it]=g;
  let p=1,s=null,r=[],rs=[];
  if(avg<=1){p=1;r.push("Your responses indicate you're in the early stages of your AI journey. Several concepts assessed — like prompt engineering, AI hallucination, retrieval-augmented generation, and the LLM/chatbot/agent distinction — are still new territory. Track 1 is designed specifically for this stage.");r.push("You'll build foundational knowledge across all five competency dimensions, with optional credentialing pathways including Google AI Essentials (free through the CCC–Google partnership).");rs.push("googleEssentials","gemini","ccccoHub","cop");if(it===0)rs.push("comptia","googlePro");}
  else if(avg<=1.8){if(pg===0||it===0){p=1;r.push("You have some AI experience, but your self-assessment shows gaps in output evaluation, technical vocabulary, and ethical frameworks. Track 1 fills those gaps systematically.");rs.push("googleEssentials","gemini","notebooklm","ccccoHub");if(t>=2){s=3;rs.push("playlab");}}else if((pg===1||it===1)&&t>=2){p=3;r.push("You have developing proficiency and want to apply it in an active course. Track 3 lets you experiment within your existing curriculum — designing, deploying, and reflecting on an AI-enhanced lesson without COR revision.");r.push("The Tool Lab module (3.3) provides guided setup for PlayLab, NotebookLM, Gemini, and sector-specific tools — matching your current experience level.");rs.push("playlab","notebooklm","gemini","sectorPathways","cop");}else if(pg===2||it===2){p=2;s=3;r.push("Your interest in formal curriculum revision makes Track 2 a strong fit. You'll integrate AI into your COR with structured peer review and governance preparation.");rs.push("gemini","notebooklm","sectorPathways","cop");}else{p=1;r.push("Based on your proficiency level and the areas where your self-assessment showed uncertainty, Track 1 will give you the strongest foundation.");rs.push("googleEssentials","gemini","ccccoHub");if(t>=2)s=3;}}
  else if(avg<=2.5){if(pg===1||it===1||(t>=2&&cu<=1)){p=3;r.push("You have solid AI proficiency — you can explain core concepts, write effective prompts, evaluate outputs, and articulate ethical considerations. Track 3 puts that knowledge to work in your classroom.");rs.push("playlab","notebooklm","gemini","nectir","sectorPathways","cop");if(te<=1)rs.push("khanmigo");}else if(pg===2||it===2||cu>=2){p=2;s=3;r.push("Your proficiency is solid and your goals center on curriculum. Track 2 channels your AI expertise into formal COR revision aligned with the Chancellor's Office competency framework.");rs.push("gemini","notebooklm","sectorPathways","cop");}else if(pg===3||it===3||pd>=2){p=4;s=3;r.push("Your proficiency and leadership interest position you well for Track 4. You'll study programs like the CVC@ONE AI CoP, PlayLab T3, and NAAIC — then collaboratively design PD frameworks for the LA-19.");rs.push("cvcone","playlabT3","naaic","ccccoHub","cop");}else{p=3;r.push("With your AI experience and active teaching context, Track 3 gives you the most immediate, tangible impact.");rs.push("playlab","notebooklm","gemini","sectorPathways","cop");}}
  else{if(pd>=2||pg===3||it===3){p=4;r.push("You're an experienced AI practitioner with strong scores across all five competency dimensions. Track 4 shifts from individual practice to regional impact through collaborative PD architecture.");rs.push("cvcone","playlabT3","naaic","ccccoHub","cop");if(t>=2&&cu<=1){s=3;rs.push("playlab");}}else if(pg===2||it===2){p=2;r.push("Despite advanced proficiency, your goals center on formal curriculum revision. Track 2 provides the structured governance process.");rs.push("gemini","notebooklm","sectorPathways","cop");}else if(pg===1||it===1){p=3;r.push("You have advanced knowledge and want to focus on classroom integration. Track 3 provides the structure to design, deploy, and document AI-enhanced instruction.");rs.push("playlab","notebooklm","gemini","nectir","khanmigo","sectorPathways","cop");}else{p=4;r.push("Your advanced proficiency makes you a natural fit for Track 4's system-level design work.");rs.push("cvcone","playlabT3","naaic","ccccoHub","cop");}}
  if(s)r.push("You may also benefit from Track "+s+" ("+TRACKS[s].name+"). Many participants engage with more than one track.");
  return{primary:p,secondary:s,avgProf:avg,dimScores:ds,rationale:r,profLevel:s2l(avg),resources:[...new Set(rs)]};
}

function submitForm(pi,ans,res){
  if(GOOGLE_FORM_URL.indexOf("PASTE")!==-1){console.log("Google Forms not configured. Data:",{pi,ans,res});return;}
  const d=new URLSearchParams();
  d.append(FIELD_IDS.name,pi.name||"");d.append(FIELD_IDS.campus,pi.campus||"");d.append(FIELD_IDS.email,pi.email||"");d.append(FIELD_IDS.assessmentType,pi.assessmentType||"Pre-Assessment");
  [...PQS,...CQS,...GQS].forEach(q=>{if(FIELD_IDS[q.id]){const i=ans[q.id];d.append(FIELD_IDS[q.id],i!==undefined?q.opts[i]:"");}});
  d.append(FIELD_IDS.d1Score,(res.dimScores.d1||0).toFixed(2));d.append(FIELD_IDS.d2Score,(res.dimScores.d2||0).toFixed(2));
  d.append(FIELD_IDS.d3Score,(res.dimScores.d3||0).toFixed(2));d.append(FIELD_IDS.d4Score,(res.dimScores.d4||0).toFixed(2));
  d.append(FIELD_IDS.d5Score,(res.dimScores.d5||0).toFixed(2));d.append(FIELD_IDS.overallLevel,LL[res.profLevel]);
  d.append(FIELD_IDS.recommendedTrack,"Track "+res.primary+": "+TRACKS[res.primary].name);
  d.append(FIELD_IDS.secondaryTrack,res.secondary?"Track "+res.secondary+": "+TRACKS[res.secondary].name:"None");
  // Use fetch with no-cors mode — Google Forms accepts this cross-origin
  fetch(GOOGLE_FORM_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:d.toString()}).catch(function(e){console.log("Form submission error:",e);});
}
